<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Morel Compass</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    .title {
      position: absolute;
      z-index: 1000;
      top: 20px;
      left: 20px;
      font-size: 28px;
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 10px;
    }
  </style>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

</head>

<body>

<div class="title">
  Morel Prediction — June 30
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([47.5, -120.5], 7);

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    attribution: '© OpenStreetMap'
  }
).addTo(map);

// Example marker
L.circle([47.5, -121.5], {
  radius: 30000,
  color: 'lime'
}).addTo(map);

</script>

</body>
</html>
